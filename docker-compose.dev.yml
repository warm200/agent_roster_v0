services:
  app:
    environment:
      NODE_ENV: development
    command:
      [
        'sh',
        '-lc',
        '/app/docker/entrypoints/run-with-env.sh pnpm dev --hostname 0.0.0.0 --port 3000',
      ]
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_next_cache:/app/.next
      - ./.env:/app/.env:ro
      - ./.env.sandbox:/app/.env.sandbox:ro

  maintenance:
    environment:
      NODE_ENV: development
    command:
      [
        'sh',
        '-lc',
        '/app/docker/entrypoints/run-with-env.sh pnpm exec tsx watch scripts/runtime-maintenance.ts --watch',
      ]
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - ./.env:/app/.env:ro
      - ./.env.sandbox:/app/.env.sandbox:ro

  nginx:
    profiles: ['prod']

  migrate:
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - ./.env:/app/.env:ro
      - ./.env.sandbox:/app/.env.sandbox:ro

volumes:
  app_node_modules:
  app_next_cache:
