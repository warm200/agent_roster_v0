services:
  postgres:
    image: postgres:16
    container_name: agent-roster-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_roster
      POSTGRES_USER: agent_roster
      POSTGRES_PASSWORD: agent_roster
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U agent_roster -d agent_roster']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
